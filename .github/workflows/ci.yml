name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── macOS: compile + unit lanes (no crictl/critest) ──────────────────────
  mac-compile:
    runs-on: [self-hosted, macos]
    env:
      # Build outside the runner _work dir: something on this host races
      # files under _work mid-build (recurrent dep-info ENOENT with clean
      # state, single listener, direct toolchain). Also: incremental builds.
      CARGO_TARGET_DIR: /Users/gustavoschneiter/.lightr-ci-target
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: put rust 1.96.0 on PATH (pre-installed; no rustup)
        run: |
          # This is a DEDICATED self-hosted mac runner running as a launchd
          # service: minimal env (HOME may be unset, no ~/.cargo/bin on PATH),
          # and the rustup proxy is flaky on this host. The 1.96.0 toolchain is
          # pre-installed with cargo/cargo-clippy/rustfmt in its own bin dir, so
          # we bypass rustup entirely and just put that dir on PATH.
          export HOME="${HOME:-/Users/gustavoschneiter}"
          TC="$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin"
          test -x "$TC/cargo" || { echo "toolchain 1.96.0 missing at $TC" >&2; exit 1; }
          echo "$TC" >> "$GITHUB_PATH"

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (unit lanes)
        run: |
          cargo test -p lightr-cri-vectors \
                     -p lightr-cri-fake \
                     -p lightr-cri-shell

  # ── Linux: full conformance (vectors A9, fake, shell, acceptance A1–A8, A10) ──
  linux-conformance:
    runs-on: [self-hosted, linux]
    # shared-docker machine class: cold builds + critest on a loaded host
    # exceeded 45m (observed 46m21s → GitHub reports timeout as 'cancelled')
    timeout-minutes: 90
    env:
      LIGHTR_CRI_REQUIRE_PROBES: "1"
      LIGHTR_BUDGET_CLASS: shared-docker
    steps:
      - uses: actions/checkout@v4

      - name: install rust 1.96.0
        run: |
          # Runner-agnostic: ~/.cargo/bin (rustup lives here) may not be on the
          # service runner's PATH (.path resets on runner update). Prepend it.
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup override set 1.96.0
          rustup component add clippy

      - name: cargo build --release --workspace
        run: cargo build --release --workspace

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: install pinned cri-tools v1.33.0
        run: |
          set -euo pipefail
          CRICTL_SHA256="8307399e714626e69d1213a4cd18c8dec3d0201ecdac009b1802115df8973f0f"
          CRITEST_SHA256="31baec20eda89276b3466ec24cfdfc54258baf27651997db7b5d4205f60ea61b"
          BASE="https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.33.0"

          curl -fsSL -o /tmp/crictl.tar.gz "${BASE}/crictl-v1.33.0-linux-amd64.tar.gz"
          echo "${CRICTL_SHA256}  /tmp/crictl.tar.gz" | sha256sum -c -
          tar -xzf /tmp/crictl.tar.gz -C /tmp
          sudo mv /tmp/crictl /usr/local/bin/crictl
          sudo chmod +x /usr/local/bin/crictl

          curl -fsSL -o /tmp/critest.tar.gz "${BASE}/critest-v1.33.0-linux-amd64.tar.gz"
          echo "${CRITEST_SHA256}  /tmp/critest.tar.gz" | sha256sum -c -
          tar -xzf /tmp/critest.tar.gz -C /tmp
          sudo mv /tmp/critest /usr/local/bin/critest
          sudo chmod +x /usr/local/bin/critest

          crictl --version
          critest --version

      - name: install iptables + iproute2 (CNI bridge/portmap NAT + netns)
        run: |
          set -euo pipefail
          # The bridge plugin (ipMasq) and portmap need iptables for NAT;
          # iproute2 for veth/netns tooling. rust:1.96-bookworm ships neither.
          sudo apt-get update -qq
          sudo apt-get install -y -qq iptables iproute2
          # CNI plugins exec iptables via $PATH; ensure /usr/sbin is on it for
          # the server + test steps (Actions step PATH can be restricted).
          echo "/usr/sbin" >> "$GITHUB_PATH"
          PATH="/usr/sbin:$PATH" command -v iptables

      - name: install CNI plugins v1.9.1 and kubelet v1.33.13 (pinned sha256)
        run: |
          set -euo pipefail

          # CNI plugins v1.9.1 — amd64
          CNI_SHA256="b98f74a0f8522f0a83867178729c1aa70f2158f90c45a2ca8fa791db1c76b303"
          CNI_URL="https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-amd64-v1.9.1.tgz"
          curl -fsSL -o /tmp/cni-plugins.tgz "${CNI_URL}"
          echo "${CNI_SHA256}  /tmp/cni-plugins.tgz" | sha256sum -c -
          sudo mkdir -p /opt/cni/bin
          sudo tar -C /opt/cni/bin -xzf /tmp/cni-plugins.tgz
          rm /tmp/cni-plugins.tgz

          # Write bridge+host-local+portmap conflist (smallest honest setup per r1-cni.md)
          sudo mkdir -p /etc/cni/net.d
          sudo tee /etc/cni/net.d/10-lightr.conflist >/dev/null <<'CONFLIST_EOF'
          {
            "cniVersion": "1.0.0",
            "name": "lightr",
            "plugins": [
              {
                "type": "bridge",
                "bridge": "cni0",
                "isGateway": true,
                "ipMasq": true,
                "ipam": {
                  "type": "host-local",
                  "subnet": "10.88.0.0/16",
                  "routes": [{ "dst": "0.0.0.0/0" }]
                }
              },
              {
                "type": "portmap",
                "capabilities": { "portMappings": true }
              }
            ]
          }
          CONFLIST_EOF
          echo "CNI plugins installed; conflist written to /etc/cni/net.d/10-lightr.conflist"

          # kubelet v1.33.13 — cache at /tmp/kubelet-cache/kubelet
          KUBELET_SHA256="0415ef7778646172f7aad830cbe09a7d903461eef9e15cd34193b85d95dfff0d"
          KUBELET_URL="https://dl.k8s.io/release/v1.33.13/bin/linux/amd64/kubelet"
          KUBELET_CACHE="/tmp/kubelet-cache"
          mkdir -p "${KUBELET_CACHE}"
          curl -fsSL -o "${KUBELET_CACHE}/kubelet" "${KUBELET_URL}"
          echo "${KUBELET_SHA256}  ${KUBELET_CACHE}/kubelet" | sha256sum -c -
          chmod +x "${KUBELET_CACHE}/kubelet"
          echo "kubelet v1.33.13 cached at ${KUBELET_CACHE}/kubelet"

      - name: cargo test --workspace (A9 vectors + fake + shell + acceptance A1–A8)
        run: cargo test --workspace

      - name: A10 critest gate
        run: bash ci/critest-gate.sh

      - name: budgets gate
        run: bash ci/budget.sh

      - name: greenlist gate
        run: bash ci/greenlist-gate.sh

      - name: B7 kubelet-smoke gate
        env:
          LIGHTR_CRI_BIN: target/release/lightr-cri
          KUBELET_BIN: /tmp/kubelet-cache/kubelet
        run: bash ci/kubelet-smoke.sh

  # ── verify-codegen: regenerate proto, diff must be empty ─────────────────
  verify-codegen:
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: install rust 1.96.0
        run: |
          # Runner-agnostic: ~/.cargo/bin (rustup lives here) may not be on the
          # service runner's PATH (.path resets on runner update). Prepend it.
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup override set 1.96.0
          rustup component add clippy

      - name: install pinned protoc v25.3
        run: |
          set -euo pipefail
          PROTOC_ZIP="protoc-25.3-linux-x86_64.zip"
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v25.3/${PROTOC_ZIP}"
          rm -rf /tmp/protoc && unzip -oq /tmp/protoc.zip -d /tmp/protoc
          sudo mv /tmp/protoc/bin/protoc /usr/local/bin/protoc
          sudo chmod +x /usr/local/bin/protoc
          # well-known types (google/protobuf/*.proto): the zip ships them in
          # include/ and protoc looks for them in /usr/local/include
          sudo cp -rf /tmp/protoc/include/google /usr/local/include/
          protoc --version

      - name: verify vendored proto sha256s against PROVENANCE.md
        run: |
          set -euo pipefail
          PROV="crates/lightr-cri-proto/PROVENANCE.md"

          # api.proto
          EXPECTED_API=$(grep 'sha256:' "$PROV" | head -1 | grep -oE '[0-9a-f]{64}')
          ACTUAL_API=$(sha256sum crates/lightr-cri-proto/proto/api.proto | awk '{print $1}')
          if [ "$ACTUAL_API" != "$EXPECTED_API" ]; then
            echo "FAIL: api.proto sha256 mismatch"
            echo "  expected: $EXPECTED_API"
            echo "  actual:   $ACTUAL_API"
            exit 1
          fi
          echo "OK: api.proto sha256 matches PROVENANCE.md"

          # gogo.proto
          EXPECTED_GOGO=$(grep 'sha256' "$PROV" | grep -oE '[0-9a-f]{64}' | tail -1)
          ACTUAL_GOGO=$(sha256sum crates/lightr-cri-proto/proto/github.com/gogo/protobuf/gogoproto/gogo.proto | awk '{print $1}')
          if [ "$ACTUAL_GOGO" != "$EXPECTED_GOGO" ]; then
            echo "FAIL: gogo.proto sha256 mismatch"
            echo "  expected: $EXPECTED_GOGO"
            echo "  actual:   $ACTUAL_GOGO"
            exit 1
          fi
          echo "OK: gogo.proto sha256 matches PROVENANCE.md"

      - name: regenerate codegen
        run: cargo run -p protogen

      - name: diff generated (drift = red)
        run: git diff --exit-code crates/lightr-cri-proto/src/generated/
